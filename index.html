<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استمارة ميثاق</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #ffffff; color: #000; font-family: sans-serif; padding: 20px; }
        .debug { color: red; border: 1px solid red; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>جارٍ تحميل الاستمارة...</h1>
        <div id="debug" class="debug" style="display:none;"></div>
    </div>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('debug').style.display = 'block';
            document.getElementById('debug').innerHTML = "خطأ: " + message;
        };

        // محاولة تشغيل التطبيق بعد التأكد من تحميل مكتبة تليجرام
        try {
            let tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            document.getElementById('app').innerHTML = "تم تحميل مكتبة تليجرام بنجاح! الاستمارة جاهزة للعمل.";
        } catch (e) {
            document.getElementById('debug').style.display = 'block';
            document.getElementById('debug').innerHTML = "فشل تحميل مكتبة تليجرام: " + e.message;
        }
    </script>
</body>
</html>
